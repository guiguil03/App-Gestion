services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: presence_scolaire
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  api:
    build: ./apps/backend
    env_file: ./apps/backend/.env
    depends_on:
      - postgres
      - redis
    ports:
      - '3000:3000'

volumes:
  postgres_data:
